# Generated by scripts/build_manifest.py - do not edit by hand.
# The site is built from the curated `site-build/` directory, which this
# script assembles by copying the README, guides, index, and every paper
# summary out of the repo root (MkDocs requires a single docs_dir tree).
# `site-build/` is git-ignored; run `python3 scripts/build_manifest.py`
# to (re)create it, then `mkdocs serve`.
site_name: Foundational GenAI Papers, Summarized
site_description: Plain-language summaries of the papers that shaped modern generative AI.
docs_dir: site-build
site_dir: site
use_directory_urls: true

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.emoji

plugins:
  - search

nav:
  - Home: README.md
  - Browse: BROWSE.md
  - Index: INDEX.md
  - By Topic: TAGS.md
  - Guides:
      - Learning Roadmap: docs/ROADMAP.md
      - Reading Guide: docs/READING_GUIDE.md
      - Quick Reference: docs/QUICK_REFERENCE.md
      - Comparisons: docs/COMPARISONS.md
